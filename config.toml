# Fill llm section before running. Everything else has working defaults.

[llm]
model    = ""
api_key  = ""
base_url = ""

[weights]
momentum    = 0.25
rsi         = 0.20
volume      = 0.20
beta        = 0.20
fundamental = 0.15

[filters]
min_score        = 40
max_results      = 15
default_beta_min = 1.3

[cache]
sqlite_path = ".cache/nse_data.db"
ttl_hours   = 8
